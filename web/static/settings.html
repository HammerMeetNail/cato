<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cato - Settings</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="topbar">
    <h1>Cato</h1>
    <nav>
      <a href="/">Library</a>
      <a href="#" id="logoutLink">Logout</a>
    </nav>
  </header>
  <main class="container">
    <div class="settings-page">
      <h2>Settings</h2>
      <p style="margin-top:16px">Settings panel coming soon.</p>
    </div>
  </main>
  <script type="module">
    import { checkAuth, logout } from '/js/api.js';
    const auth = await checkAuth();
    if (!auth.authenticated) { window.location.href = '/login'; throw new Error(); }
    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = '/login';
    });
  </script>
</body>
</html>
