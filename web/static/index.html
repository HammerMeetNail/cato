<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cato - Game Library</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1>Cato</h1>
      <nav>
        <span id="userDisplay"></span>
        <a href="/login" id="loginLink">Login</a>
        <a href="#" id="logoutLink" style="display:none">Logout</a>
      </nav>
    </header>

    <main class="container">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search games..." autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>

      <div class="tabs" id="statusTabs">
        <button class="tab active" data-status="">All</button>
        <button class="tab" data-status="wishlist">Wishlist</button>
        <button class="tab" data-status="backlog">Backlog</button>
        <button class="tab" data-status="playing">Playing</button>
        <button class="tab" data-status="completed">Completed</button>
        <button class="tab" data-status="abandoned">Abandoned</button>
      </div>

      <div class="game-grid" id="gameGrid">
        <div class="loading">Loading library...</div>
      </div>
    </main>
  </div>

  <script type="module">
    import { checkAuth, logout, library } from '/js/api.js';
    import { initSearch } from '/js/search.js';
    import { loadLibrary, loadSearchResults, addGameToLibrary, renderLibraryItems, getHashStatus, getHashGameId, getHashSearch, openGameModal, activateStatusTab } from '/js/library.js';

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const userDisplay = document.getElementById('userDisplay');
    const loginLink = document.getElementById('loginLink');
    const logoutLink = document.getElementById('logoutLink');
    const statusTabs = document.getElementById('statusTabs');

    async function handleRoute() {
      const searchQuery = getHashSearch();
      if (searchQuery) {
        searchInput.value = searchQuery;
        await loadSearchResults(searchQuery);
        return;
      }

      const status = getHashStatus();
      const gameId = getHashGameId();
      await loadLibrary(status);
      if (gameId) {
        openGameModal(gameId);
      }
    }

    const initialSearch = getHashSearch();
    const initialStatus = getHashStatus();
    const initialGameId = getHashGameId();

    // Fire auth check and library fetch simultaneously so neither waits for
    // the other.  On a fresh page load this cuts the visible wait time from
    // sum(auth + library) to roughly max(auth, library).
    // library.list() will return a 401 for unauthenticated users; we catch
    // that so it doesn't surface as an unhandled rejection.
    const [auth, items] = await Promise.all([
      checkAuth(),
      initialSearch ? null : library.list(initialStatus).catch(() => null),
    ]);

    if (!auth.authenticated) {
      window.location.href = '/login' + window.location.hash;
      throw new Error('Not authenticated');
    }

    userDisplay.textContent = auth.display_name || auth.email || '';
    loginLink.style.display = 'none';
    logoutLink.style.display = 'inline';

    logoutLink.addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = '/login';
    });

    // Search
    initSearch(searchInput, searchResults, (game) => {
      addGameToLibrary(game);
      searchInput.value = '';
    }, (query) => {
      window.location.hash = '#search/' + encodeURIComponent(query);
    });

    // Status tabs
    statusTabs.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', async () => {
        const status = tab.dataset.status || '';
        if (status) {
          window.location.hash = '#' + status;
        } else {
          history.replaceState(null, '', window.location.pathname + window.location.search);
          searchInput.value = '';
          await handleRoute();
        }
      });
    });

    // Render with already-loaded data; fall back to a fresh fetch if the
    // parallel request failed for a non-auth reason (e.g. transient error).
    if (initialSearch) {
      searchInput.value = initialSearch;
      await loadSearchResults(initialSearch);
    } else {
      activateStatusTab(initialStatus);
      if (items !== null) {
        renderLibraryItems(items, initialStatus);
      } else {
        loadLibrary(initialStatus);
      }

      if (initialGameId) {
        openGameModal(initialGameId);
      }
    }

    window.addEventListener('hashchange', handleRoute);
  </script>
</body>
</html>
